services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: skema_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skema_db}
      MYSQL_USER: ${MYSQL_USER:-skema}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-skemapassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h", "localhost",
          "-u", "root",
          "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - skema_net

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skema_backend
    restart: unless-stopped
    environment:
      # DB — 서비스명 'db' 로 연결 (localhost 금지)
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-skema}:${MYSQL_PASSWORD:-skemapassword}@db:3306/${MYSQL_DATABASE:-skema_db}
      # JWT
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      # AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      # CORS — 쉼표로 구분, 브라우저에서 접근하는 프론트 URL 포함
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # OAuth redirect_uri 생성에 사용 (OAuth 앱 설정의 callback URL과 일치해야 함)
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      # 강의계획서 업로드 파일 영속화
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skema_net

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드타임 번들에 포함 → ARG로 전달
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: skema_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - skema_net

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  skema_net:
    driver: bridge
